<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Abhyuday</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Outfit (Body), Cinzel (Elegant Headings), Great Vibes (Cultural Cursive accents) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Great+Vibes&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
    <!-- Decorative background pattern for admin as well -->
    <div class="bg-pattern" style="opacity: 0.5;"></div>

    <!-- Admin Navbar -->
    <nav class="admin-navbar">
        <div class="logo">
            <img src="public/club%20logo%20without%20text.png" alt="Abhyuday Logo" class="glow-icon" style="height: 80px; width: auto; object-fit: contain; margin-right: 5px;"> Abhyuday Admin
        </div>
        <div>
            <a href="index.html" class="btn btn-secondary border-glow" style="padding: 0.5rem 1rem; font-size: 0.8rem; letter-spacing: 0;">View Site</a>
            <button onclick="logoutAdmin()" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.8rem; margin-left: 10px; border-radius: 8px; letter-spacing: 0;">Logout</button>
        </div>
    </nav>

    <div class="admin-container relative-z">
        <!-- Sidebar -->
        <aside class="admin-sidebar glass-card">
            <ul class="admin-menu">
                <li class="active" onclick="switchAdminTab('events-management', this)"><i class="fa-solid fa-calendar-days" style="color:var(--accent);"></i> Manage Events</li>
                <li onclick="switchAdminTab('team-management', this)"><i class="fa-solid fa-users" style="color:var(--accent);"></i> Manage Team</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Events Management Tab -->
            <div id="events-management" class="admin-tab active">
                <div class="tab-header fade-in visible">
                    <h2>Events Management</h2>
                    <button class="btn btn-primary" onclick="openAddEventModal()"><i class="fa-solid fa-plus"></i> Add Event</button>
                </div>
                
                <div class="admin-table-container glass-card fade-in visible delay-1">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-events-list">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Team Management Tab -->
            <div id="team-management" class="admin-tab" style="display: none;">
                <div class="tab-header">
                    <h2>Team Management</h2>
                    <button class="btn btn-primary" onclick="openAddTeamModal()"><i class="fa-solid fa-plus"></i> Add Member</button>
                </div>
                
                <div class="admin-table-container glass-card">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Branch</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-team-list">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Event Modal -->
    <div class="modal-overlay" id="event-modal">
        <div class="modal-content glass-card" style="max-width: 500px;">
            <span class="close-modal" onclick="closeModal('event-modal')">&times;</span>
            <h2 id="event-modal-title" style="margin-bottom: 1.5rem; font-family: var(--font-heading); color: var(--accent);">Add Event</h2>
            <form id="event-form" onsubmit="saveEvent(event)">
                <input type="hidden" id="event-id">
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="event-name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Event Date</label>
                    <input type="date" id="event-date" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="event-image" class="form-input" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="event-category" class="form-input" required style="background: rgba(0,0,0,0.5);">
                        <option value="upcoming">Upcoming</option>
                        <option value="past">Past</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="event-desc" class="form-input" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Save Event</button>
            </form>
        </div>
    </div>

    <!-- Add/Edit Team Modal -->
    <div class="modal-overlay" id="team-modal">
        <div class="modal-content glass-card" style="max-width: 500px;">
            <span class="close-modal" onclick="closeModal('team-modal')">&times;</span>
            <h2 id="team-modal-title" style="margin-bottom: 1.5rem; font-family: var(--font-heading); color: var(--accent);">Add Team Member</h2>
            <form id="team-form" onsubmit="saveTeamMember(event)">
                <input type="hidden" id="team-id">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="team-name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="team-role" class="form-input" placeholder="e.g. President, Coordinator" required>
                </div>
                <div class="form-group">
                    <label>Branch</label>
                    <input type="text" id="team-branch" class="form-input" placeholder="e.g. Computer Science" required>
                </div>
                <div class="form-group">
                    <label>Photo URL</label>
                    <input type="url" id="team-photo" class="form-input" placeholder="https://..." required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Save Member</button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"><i class="fa-solid fa-bell"></i> <span id="toast-msg">Notification text</span></div>

    <script src="script.js"></script>
    <script>
        // Check admin session
        window.onload = function() {
            if(sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
                window.location.href = 'index.html';
            }
            initAdminData();
        };

        // Override showToast to work with specific ID in admin
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            if (!toast || !toastMsg) return;
            toastMsg.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
